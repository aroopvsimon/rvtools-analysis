<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RVTools Analysis</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="hero">
    <div>
      <h1>RVTools Analysis</h1>
      <p>Upload an RVTools Excel export and get a clean summary for your assessment deck.</p>
    </div>
  </header>

  <main class="container">
    <section class="card uploader">
      <h2>1. Upload RVTools .xlsx</h2>
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
      <p class="muted">The file is parsed locally in your browser. Nothing is uploaded anywhere.</p>
      <div id="sheetStatus" class="sheet-status"></div>
    </section>

    <section class="grid stats" id="stats"></section>

    <section class="card hidden" id="execSummaryCard">
      <div class="section-head">
        <h2>Executive Summary</h2>
        <button id="copySummaryBtn" class="secondary">Copy summary</button>
      </div>
      <div id="execSummary" class="summary-box"></div>
    </section>

    <section class="card hidden" id="obsCard">
      <div class="section-head">
        <h2>Assessment Observations</h2>
        <button id="copyObsBtn" class="secondary">Copy observations</button>
      </div>
      <ul id="observations" class="observations"></ul>
    </section>

    <section class="card hidden" id="clusterCard">
      <div class="section-head">
        <h2>PPT Ready Cluster Table</h2>
        <button id="downloadClusterCsvBtn" class="secondary">Download CSV</button>
      </div>
      <div class="table-wrap">
        <table id="clusterTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card hidden" id="hostCard">
      <div class="section-head">
        <h2>Host Summary</h2>
        <button id="downloadHostCsvBtn" class="secondary">Download CSV</button>
      </div>
      <div class="table-wrap">
        <table id="hostTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
